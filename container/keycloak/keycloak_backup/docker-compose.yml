services:
  erpbarczok:
    container_name: erpbarczok_kc
    image: erpbarczok_kc:latest
    build: ..
    ports: 
    - 8081:8080
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: "admin"
      KC_BOOTSTRAP_ADMIN_PASSWORD: "admin"
    restart: "no"
    volumes:
      - type: volume
        source: keycloak
        target: /opt/keycloak/data
        readonly: false
      - type: volume
        source: ../keycloak_realms
        target: /opt/keycloak/export
    command:
      - "export"
      - "--dir"
      - "/opt/keycloak/export/"
      - "--optimized"
      - "users"
      - "realm_file"

volumes: 
  keycloak
